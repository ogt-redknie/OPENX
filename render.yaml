services:
  - type: web
    name: opnex
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPNEX_GATEWAY_PORT
        value: "8080"
      - key: OPNEX_STATE_DIR
        value: /data/.opnex
      - key: OPNEX_WORKSPACE_DIR
        value: /data/workspace
      - key: OPNEX_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: opnex-data
      mountPath: /data
      sizeGB: 1
