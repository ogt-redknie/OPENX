name: OPNEX
options:
  bundleIdPrefix: ai.opnex
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  OPNEXKit:
    path: ../shared/OPNEXKit
  Swabble:
    path: ../../Swabble

schemes:
  OPNEX:
    shared: true
    build:
      targets:
        OPNEX: all
    test:
      targets:
        - OPNEXTests
        - OPNEXLogicTests
  OPNEXLogicTests:
    shared: true
    build:
      targets:
        OPNEXLogicTests: all
    test:
      targets:
        - OPNEXLogicTests

targets:
  OPNEX:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: OPNEXShareExtension
        embed: true
      - target: OPNEXActivityWidget
        embed: true
      - target: OPNEXWatchApp
      - package: OPNEXKit
      - package: OPNEXKit
        product: OPNEXChatUI
      - package: OPNEXKit
        product: OPNEXProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/OPNEXKit,$SRCROOT/../../Swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/OPNEX.entitlements
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPNEX_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPNEX_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          OPNEX_PUSH_TRANSPORT: direct
          OPNEX_PUSH_DISTRIBUTION: local
          OPNEX_PUSH_RELAY_BASE_URL: ""
          OPNEX_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          OPNEX_PUSH_TRANSPORT: direct
          OPNEX_PUSH_DISTRIBUTION: local
          OPNEX_PUSH_RELAY_BASE_URL: ""
          OPNEX_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: OPNEX
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.opnex.ios
            CFBundleURLSchemes:
              - opnex
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        OPNEXCanonicalVersion: "$(OPNEX_IOS_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.opnex.ios.bgrefresh
        NSLocalNetworkUsageDescription: OPNEX discovers and connects to your OPNEX gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _opnex-gw._tcp
        NSCameraUsageDescription: OPNEX can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: OPNEX uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: OPNEX can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: OPNEX needs microphone access for voice wake.
        NSMotionUsageDescription: OPNEX may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: OPNEX needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: OPNEX uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        OPNEXPushTransport: "$(OPNEX_PUSH_TRANSPORT)"
        OPNEXPushDistribution: "$(OPNEX_PUSH_DISTRIBUTION)"
        OPNEXPushRelayBaseURL: "$(OPNEX_PUSH_RELAY_BASE_URL)"
        OPNEXPushAPNsEnvironment: "$(OPNEX_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  OPNEXShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: OPNEXKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPNEX_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPNEX_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: OPNEX Share
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  OPNEXActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/OPNEXActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPNEX_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: OPNEX Activity
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OPNEXWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: OPNEXWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(OPNEX_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(OPNEX_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPNEX_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPNEX_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: OPNEX
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(OPNEX_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  OPNEXWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(OPNEX_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(OPNEX_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPNEX_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPNEX_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: OPNEX
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(OPNEX_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  OPNEXTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: OPNEX
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opnex.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OPNEX.app/OPNEX"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OPNEXTests
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"

  OPNEXLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: OPNEXKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPNEX_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPNEX_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opnex.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OPNEXLogicTests
        CFBundleShortVersionString: "$(OPNEX_MARKETING_VERSION)"
        CFBundleVersion: "$(OPNEX_BUILD_VERSION)"
